<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Allura',cursive;

    background:
    linear-gradient(135deg,#ffffff,#f7f7f7,#eeeeee);

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* SOFT LIGHT */

body::before{
    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:rgba(255,255,255,.9);

    border-radius:50%;

    filter:blur(120px);

    top:-150px;
    left:-120px;
}

body::after{
    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:rgba(255,255,255,.9);

    border-radius:50%;

    filter:blur(120px);

    bottom:-150px;
    right:-120px;
}

/* NAVBAR */

.navbar{

    width:92%;

    margin:25px auto;

    padding:20px 30px;

    border-radius:35px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:rgba(255,255,255,.25);

    backdrop-filter:blur(28px);

    border:1px solid rgba(255,255,255,.8);

    box-shadow:
    0 8px 32px rgba(255,255,255,.9),
    inset 0 1px 1px rgba(255,255,255,.9);

    position:relative;

    z-index:5;
}

.logo{

    font-size:52px;

    color:#000;
}

.menu{
    display:flex;
    gap:20px;
}

.menu a{

    text-decoration:none;

    font-size:32px;

    color:#000;

    padding:12px 25px;

    border-radius:20px;

    background:rgba(255,255,255,.22);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.8);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.9),
    0 4px 18px rgba(0,0,0,.04);

    transition:.3s;
}

.menu a:hover{
    transform:translateY(-4px);
}

/* HERO */

.hero{

    width:92%;

    margin:auto;

    padding:35px;

    border-radius:40px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(35px);

    border:1px solid rgba(255,255,255,.8);

    box-shadow:
    0 10px 40px rgba(255,255,255,.9),
    inset 0 1px 1px rgba(255,255,255,.9);

    position:relative;

    z-index:5;
}

.hero-content{

    display:flex;

    align-items:center;

    gap:40px;

    flex-wrap:wrap;
}

.hero-text{
    flex:1;
}

.hero-text h1{

    font-size:95px;

    color:#000;

    line-height:1;
}

.hero-text p{

    margin-top:18px;

    font-size:34px;

    color:#000;

    line-height:1.5;
}

.btn{

    display:inline-block;

    margin-top:25px;

    text-decoration:none;

    color:#000;

    font-size:34px;

    padding:15px 35px;

    border-radius:22px;

    background:rgba(255,255,255,.2);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.8);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,.9),
    0 4px 18px rgba(0,0,0,.04);
}

/* VIDEO */

.video-box{
    flex:1;
}

.video-box video{

    width:100%;

    border-radius:35px;

    object-fit:cover;

    border:1px solid rgba(255,255,255,.9);

    box-shadow:
    0 10px 40px rgba(255,255,255,.9);
}

/* SECTION */

.section{

    width:92%;

    margin:60px auto;

    position:relative;

    z-index:5;
}

.section h2{

    font-size:65px;

    color:#000;

    margin-bottom:25px;
}

/* CARDS */

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

    gap:28px;
}

.card{

    padding:18px;

    border-radius:35px;

    background:rgba(255,255,255,.2);

    backdrop-filter:blur(35px);

    border:1px solid rgba(255,255,255,.9);

    box-shadow:
    0 10px 35px rgba(255,255,255,.9),
    inset 0 1px 1px rgba(255,255,255,.9);

    transition:.4s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{

    width:100%;

    height:340px;

    object-fit:cover;

    border-radius:28px;
}

.card h3{

    margin-top:15px;

    font-size:42px;

    color:#000;
}

.card p{

    margin-top:10px;

    font-size:28px;

    color:#000;
}

/* FOOTER */

.footer{

    text-align:center;

    padding:40px;

    font-size:42px;

    color:#000;
}

/* MOBILE */

@media(max-width:768px){

.hero-text h1{
    font-size:70px;
}

.hero-text p{
    font-size:28px;
}

.menu{
    display:none;
}

.hero{
    padding:22px;
}

.card img{
    height:260px;
}

}

</style>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">Liquid</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Videos</a>
<a href="#">Trending</a>
</div>

</nav>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<div class="hero-text">

<h1>Liquid Glass</h1>

<p>
Ultra soft transparent cinematic glass style website with smooth water feeling interface.
</p>

<a href="#" class="btn">Watch</a>

</div>

<div class="video-box">

<video autoplay muted loop playsinline controls>
<source src="YOUR_VIDEO.mp4" type="video/mp4">
</video>

</div>

</div>

</section>

<!-- CARDS -->

<section class="section">

<h2>Trending</h2>

<div class="cards">

<div class="card">

<img src="https://i.pinimg.com/736x/0d/7d/56/0d7d5690d4f0c4c00c4977d3c4dce7cb.jpg">

<h3>Liquid Style</h3>

<p>Soft premium transparent interface.</p>

</div>

<div class="card">

<img src="https://i.pinimg.com/736x/0b/e5/90/0be590e29d7ec7c7310a68f7c5b8f2e2.jpg">

<h3>Glass Effect</h3>

<p>Ultra smooth water glass feeling.</p>

</div>

</div>

</section>

<footer class="footer">
Liquid Glass UI
</footer>
