<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Mod APK Store</title>

<!-- ফন্ট ডাউনলোড: Google Fonts থেকে মডার্ন Plus Jakarta Sans এবং কার্সিভ স্টাইলের Great Vibes -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

<!-- প্রফেশনাল চিহ্ন বা আইকনের জন্য Font Awesome CDN লিংক -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
  --bg:#e9edf2;
  --dark:#1a202c;
  --light:#ffffff;
  --shadow1:#cbd5e1;
  --shadow2:#ffffff;
  --text-muted:#64748b;
  --accent:#3b82f6;
  --accent-mod:#ef4444;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--dark);
  min-height:100vh;
  padding-bottom:120px;
}

/* TOPBAR */

.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px;
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
}

/* লোগো মেকওভার */
.logo-container {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: var(--bg);
  padding: 2px;
  box-shadow:
  6px 6px 12px var(--shadow1),
  -6px -6px 12px var(--shadow2);
}

.logo{
  width:100%;
  height:100%;
  border-radius:14px;
  object-fit:cover;
  border: 1px solid rgba(255,255,255,0.8);
}

.search-wrap{
  flex:1;
  display:flex;
  align-items:center;
  border-radius:20px;
  overflow:hidden;
  background:var(--bg);
  box-shadow:
  inset 4px 4px 10px var(--shadow1),
  inset -4px -4px 10px var(--shadow2);
}

.search-wrap input{
  flex:1;
  border:none;
  outline:none;
  background:none;
  padding:14px 18px;
  font-size:14px;
  font-weight: 500;
  color: var(--dark);
}

.search-wrap button{
  padding: 0 20px;
  height:50px;
  border:none;
  background:none;
  font-size:16px;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.2s;
}

.search-wrap button:hover{
  color: var(--accent);
}

/* SECTION TITLE (কার্সিভ ফন্ট স্টাইল) */

.section-title{
  font-family: 'Great Vibes', cursive;
  padding: 20px 20px 0px;
  font-size: 38px;
  font-weight: 700;
  color: var(--dark);
}

/* FEATURED BANNER */

.banner{
  margin:12px 20px 24px;
  height:190px;
  border-radius:28px;
  padding:26px;
  display:flex;
  align-items:flex-end;
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
}

.banner-title{
  color:#fff;
  font-size:28px;
  font-weight:800;
  letter-spacing: -0.5px;
}

.banner-sub{
  color:#94a3b8;
  margin-top:6px;
  font-size: 14px;
  font-weight: 500;
}

.banner-badge{
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(5px);
  color:#fff;
  padding:6px 14px;
  border-radius:14px;
  font-size:11px;
  font-weight:700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* APP GRID */

.app-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:12px 20px 24px;
}

.app-card{
  padding:24px 14px;
  border-radius:26px;
  text-align:center;
  background:var(--bg);
  box-shadow:
  8px 8px 16px var(--shadow1),
  -8px -8px 16px var(--shadow2);
  transition: transform 0.2s ease;
  cursor: pointer;
}

.app-card:active{
  transform: scale(0.96);
}

/* আইকন বক্সের নিউমরফিজম ডিজাইন */
.app-icon-box{
  width:58px;
  height:58px;
  border-radius:18px;
  margin:0 auto 16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 22px;
  box-shadow:
  inset 4px 4px 8px var(--shadow1),
  inset -4px -4px 8px var(--shadow2);
}

.app-card:nth-child(1) .app-icon-box { color: #3b82f6; }
.app-card:nth-child(2) .app-icon-box { color: #ec4899; }
.app-card:nth-child(3) .app-icon-box { color: #10b981; }
.app-card:nth-child(4) .app-icon-box { color: #8b5cf6; }

.app-name{
  font-size:16px;
  font-weight:700;
  color: var(--dark);
}

.app-type{
  margin-top:4px;
  color:var(--text-muted);
  font-size:12px;
  font-weight: 500;
}

.app-status{
  display:inline-block;
  margin-top:10px;
  font-size:10px;
  font-weight:800;
  text-transform: uppercase;
  color: var(--accent-mod);
  letter-spacing: 0.5px;
}

/* USER PORTAL CARD */

.portal-box{
  margin:12px 20px 24px;
  padding:24px;
  border-radius:28px;
  background:var(--bg);
  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap:16px;
}

.portal-info{
  flex: 1;
}

.portal-title{
  font-size:16px;
  font-weight:700;
}

.portal-sub{
  font-size:12px;
  color: var(--text-muted);
  margin-top:2px;
}

.portal-btn{
  padding:12px 20px;
  border:none;
  border-radius:16px;
  background:var(--bg);
  font-size:13px;
  font-weight:700;
  color: var(--accent);
  box-shadow:
  5px 5px 10px var(--shadow1),
  -5px -5px 10px var(--shadow2);
  cursor: pointer;
  transition: all 0.2s ease;
}

.portal-btn:active{
  box-shadow:
  inset 3px 3px 6px var(--shadow1),
  inset -3px -3px 6px var(--shadow2);
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  left:20px;
  right:20px;
  bottom:20px;
  height:75px;
  border-radius:24px;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:space-around;
  box-shadow:
  10px 10px 20px var(--shadow1),
  -10px -10px 20px var(--shadow2);
  z-index: 1000;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content: center;
  height: 100%;
  flex: 1;
  cursor: pointer;
  color:var(--text-muted);
  transition: color 0.2s ease;
}

.nav-icon{
  font-size:20px;
  margin-bottom: 5px;
}

.nav-text{
  font-size:11px;
  font-weight: 600;
}

.active{
  color:var(--dark);
}

.active .nav-icon {
  color: var(--accent);
}

</style>
</head>
<body>

<!-- TOPBAR -->

<div class="topbar">
  <div class="logo-container">
    <img src="https://i.postimg.cc/bNzXXs5R/Picsart-26-05-07-21-15-13-901.png" class="logo" alt="Logo">
  </div>
  <div class="search-wrap">
    <input type="text" placeholder="Search premium mods...">
    <button><i class="fa-solid fa-magnifying-glass"></i></button>
  </div>
</div>

<!-- FEATURED MOD BANNER -->

<div class="banner">
  <div>
    <div class="banner-title">CapCut Pro</div>
    <div class="banner-sub">Premium Unlocked v12.4.0</div>
  </div>
  <div class="banner-badge">Unlocked</div>
</div>

<!-- PREMIUM APPS GRID -->

<div class="section-title">
  Trending Premium Mods
</div>

<div class="app-grid">

  <div class="app-card">
    <div class="app-icon-box"><i class="fa-solid fa-video"></i></div>
    <div class="app-name">CapCut</div>
    <div class="app-type">Video Editor</div>
    <div class="app-status">Mod Unlocked</div>
  </div>

  <div class="app-card">
    <div class="app-icon-box"><i class="fa-solid fa-camera"></i></div>
    <div class="app-name">Picsart</div>
    <div class="app-type">Photo Gold</div>
    <div class="app-status">Gold Active</div>
  </div>

  <div class="app-card">
    <div class="app-icon-box"><i class="fa-solid fa-clapperboard"></i></div>
    <div class="app-name">InShot</div>
    <div class="app-type">Media Pro</div>
    <div class="app-status">Pro Features</div>
  </div>

  <div class="app-card">
    <div class="app-icon-box"><i class="fa-solid fa-palette"></i></div>
    <div class="app-name">Canva</div>
    <div class="app-type">Design Premium</div>
    <div class="app-status">Premium</div>
  </div>

</div>

<!-- USER PORTAL -->

<div class="section-title">
  Account Center
</div>

<div class="portal-box">
  <div class="portal-info">
    <div class="portal-title">Premium Member Portal</div>
    <div class="portal-sub">Sign in to sync cloud downloads</div>
  </div>
  <button class="portal-btn"><i class="fa-solid fa-right-to-bracket" style="margin-right: 6px;"></i>Sign In</button>
</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <div class="nav-item active">
    <i class="fa-solid fa-house nav-icon"></i>
    <div class="nav-text">Home</div>
  </div>

  <div class="nav-item">
    <i class="fa-solid fa-cubes nav-icon"></i>
    <div class="nav-text">Apps</div>
  </div>

  <div class="nav-item">
    <i class="fa-solid fa-cloud-arrow-down nav-icon"></i>
    <div class="nav-text">Updates</div>
  </div>

  <div class="nav-item">
    <i class="fa-solid fa-circle-user nav-icon"></i>
    <div class="nav-text">Profile</div>
  </div>

</div>

</body>
</html>
